name: Keep Streamlit App Warm

# Ping app setiap 6 jam supaya Streamlit Cloud tidak men-sleep instance.
# Jika app sedang sleep, workflow otomatis POST wake request via curl.
on:
  schedule:
    - cron: "0 */6 * * *"   # tiap 6 jam (UTC)
  workflow_dispatch:         # bisa dipicu manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wake up Streamlit app (curl)
        run: |
          APP_URL="https://labs-daunsalam-ok.streamlit.app/Visualisasi_DPPH"
          BASE_URL="https://labs-daunsalam-ok.streamlit.app"
          COOKIE_JAR="/tmp/sc_cookies.txt"

          for i in $(seq 1 30); do
            BODY=$(curl -sL -c "$COOKIE_JAR" -b "$COOKIE_JAR" "$APP_URL")

            if echo "$BODY" | grep -qi "get this app back up"; then
              echo "[Attempt $i] App is sleeping. Waking up..."

              # Extract form action from sleep page (e.g. action="/_stcore/wake")
              WAKE_PATH=$(echo "$BODY" | grep -oi 'action="[^"]*"' | head -1 | sed 's/action="//;s/"//')

              if [ -z "$WAKE_PATH" ]; then
                WAKE_URL="$APP_URL"
              elif [[ "$WAKE_PATH" == http* ]]; then
                WAKE_URL="$WAKE_PATH"
              else
                WAKE_URL="${BASE_URL}${WAKE_PATH}"
              fi

              echo "  Wake URL: $WAKE_URL"

              # Extract CSRF token from cookies if available
              CSRF=$(grep "_streamlit_csrf" "$COOKIE_JAR" 2>/dev/null | tail -1 | awk '{print $NF}')

              # Send wake POST with cookies and CSRF
              curl -sL -b "$COOKIE_JAR" -c "$COOKIE_JAR" \
                -H "Origin: $BASE_URL" \
                -H "Referer: $APP_URL" \
                ${CSRF:+-H "x-csrf-token: $CSRF"} \
                -X POST "$WAKE_URL" -d "" -o /dev/null

              echo "  Waiting 15s for app to resume..."
              sleep 15
            else
              echo "App is awake! (attempt $i)"
              if echo "$BODY" | grep -qi "<title>"; then
                TITLE=$(echo "$BODY" | grep -oi '<title>[^<]*</title>')
                echo "  $TITLE"
              fi
              exit 0
            fi
          done

          echo "Timeout: app did not wake after 30 attempts"
          exit 1
