name: Keep Streamlit App Warm

# Ping app setiap 6 jam supaya Streamlit Cloud tidak men-sleep instance.
# Streamlit Cloud auto-sleep app setelah ~7 hari tidak ada traffic.
on:
  schedule:
    - cron: "0 */6 * * *"   # tiap 6 jam (UTC)
  workflow_dispatch:         # bisa dipicu manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging https://labs-daunsalam-ok.streamlit.app/Visualisasi_DPPH ..."
          curl -s --max-time 60 --max-redirs 0 \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            "https://labs-daunsalam-ok.streamlit.app/Visualisasi_DPPH" || true
          echo "Done."
