name: Keep Streamlit App Warm

# Ping app setiap 6 jam supaya Streamlit Cloud tidak men-sleep instance.
# Streamlit Cloud auto-sleep app setelah ~7 hari tidak ada traffic.
on:
  schedule:
    - cron: "0 */6 * * *"   # tiap 6 jam (UTC)
  workflow_dispatch:         # bisa dipicu manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ping app
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::warning::Set repo secret STREAMLIT_APP_URL ke URL public app lo."
            echo "Contoh: https://daun-salam-antioksidan.streamlit.app"
            exit 0
          fi
          python app/keep_alive.py "$APP_URL"
